<!DOCTYPE html><html><head><meta charset="utf-8"><title>Admin console — Meridian</title><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="Shell.jsx?v=2"></script>
<script type="text/babel" src="OverviewScreen.jsx"></script>
<script type="text/babel" src="CustomersScreen.jsx?v=2"></script>
<script type="text/babel" src="SettingsScreen.jsx?v=2"></script>
<script type="text/babel" src="ExtraScreens.jsx?v=2"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Dialog, Toast, ToastStack, Button, Input, Select, Textarea, CommandPalette } = window.EfolusiDesignSystem_4ffc3d;
const TITLES = { overview: 'Overview', customers: 'Customers', projects: 'Projects', usage: 'Usage', billing: 'Billing', settings: 'Workspace settings' };
function Placeholder({ name }) {
  return <div style={{ padding: 24 }}><div style={{ border: '1px dashed var(--sand-300)', borderRadius: 'var(--radius-md)', padding: 48, textAlign: 'center', color: 'var(--text-muted)', fontSize: 14 }}>{name} — intentionally omitted from this kit.</div></div>;
}
function App() {
  const [nav, setNav] = React.useState('overview');
  const [dialog, setDialog] = React.useState(false);
  const [cmdk, setCmdk] = React.useState(false);
  const [toasts, setToasts] = React.useState([]);
  React.useEffect(() => {
    const key = e => { if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setCmdk(o => !o); } };
    document.addEventListener('keydown', key);
    return () => document.removeEventListener('keydown', key);
  }, []);
  const notify = (title, description) => {
    const id = Date.now();
    setToasts(t => [...t, { id, title, description }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 5000);
  };
  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar nav={nav} onNav={setNav} />
      <main style={{ flex: 1, overflowY: 'auto' }}>
        <Topbar title={TITLES[nav]} onSearch={() => setCmdk(true)} notify={notify} />
        {nav === 'overview' && <DashboardScreen onNewProject={() => setDialog(true)} notify={notify} />}
        {nav === 'customers' && <CustomersScreen notify={notify} />}
        {nav === 'settings' && <SettingsScreen notify={notify} />}
        {nav === 'projects' && <ProjectsScreen onNewProject={() => setDialog(true)} notify={notify} />}
        {nav === 'usage' && <UsageScreen />}
        {nav === 'billing' && <BillingScreen notify={notify} />}
      </main>
      <CommandPalette open={cmdk} onClose={() => setCmdk(false)} onSelect={id => {
        if (id === 'new') setDialog(true);
        else if (id === 'invite') { setNav('settings'); notify('Members opened', 'Invite from the Members tab.'); }
        else if (id.startsWith('go-')) setNav(id.slice(3));
        else if (id.startsWith('kit-')) window.location.href = '../' + id.slice(4) + '/index.html';
      }} groups={[
        { group: 'Actions', items: [
          { id: 'new', label: 'New project', icon: 'plus' },
          { id: 'invite', label: 'Invite teammate', icon: 'mail', hint: 'Settings' },
        ]},
        { group: 'Go to', items: [
          { id: 'go-customers', label: 'Customers', icon: 'users' },
          { id: 'go-usage', label: 'Usage', icon: 'activity' },
          { id: 'go-billing', label: 'Billing', icon: 'credit-card' },
        ]},
        { group: 'Platform', items: [
          { id: 'kit-agent', label: 'AI agents', icon: 'bot' },
          { id: 'kit-infra', label: 'Infrastructure', icon: 'server' },
          { id: 'kit-trader', label: 'Trading', icon: 'chart-candlestick' },
          { id: 'kit-tools', label: 'File tools', icon: 'package' },
        ]},
      ]} />
      <Dialog open={dialog} onClose={() => setDialog(false)} title="New project" description="Projects group keys, environments, and usage."
        footer={<React.Fragment><Button variant="ghost" onClick={() => setDialog(false)}>Cancel</Button><Button onClick={() => { setDialog(false); notify('Project created', 'Q3 launch plan is ready to go.'); }}>Create project</Button></React.Fragment>}>        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <Input label="Project name" placeholder="Q3 launch plan" autoFocus />
          <Select label="Surface" options={['AI agents', 'Infrastructure', 'Automation', 'File tools', 'Trading', 'Finance']} />
        </div>
      </Dialog>
      <ToastStack>
        {toasts.map(t => <Toast key={t.id} tone="success" title={t.title} description={t.description} onClose={() => setToasts(x => x.filter(y => y.id !== t.id))} />)}
      </ToastStack>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
