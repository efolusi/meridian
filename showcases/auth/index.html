<!DOCTYPE html><html><head><meta charset="utf-8"><title>Sign in — Meridian</title><link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="AuthScreens.jsx?v=2"></script>
</head><body>
<div id="root"></div>
<script type="text/babel">
const { Toast, ToastStack } = window.EfolusiDesignSystem_4ffc3d;
function App() {
  const [mode, setMode] = React.useState('signin');
  const [toast, setToast] = React.useState(null);
  const done = kind => {
    if (kind === 'sso') {
      setToast({ title: 'Redirecting to your identity provider', description: 'SSO is configured by your workspace admin.' });
      setTimeout(() => setToast(null), 4000);
      return;
    }
    setToast(kind === true ? { title: 'Account created', description: 'Check your inbox to verify your email.' } : { title: 'Signed in', description: 'Taking you to Acme Workspace…' });
    setTimeout(() => { window.location.href = '../console/index.html'; }, 1600);
  };
  return (
    <div style={{ display: 'flex', height: '100vh' }}>
      <BrandPanel />
      <div style={{ flex: 1.2, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'var(--surface-page)' }}>
        {mode === 'forgot' ? <ForgotForm onBack={() => setMode('signin')} />
          : mode === 'magic' ? <MagicForm onBack={() => setMode('signin')} />
          : <AuthForm mode={mode} onSwitch={() => setMode(mode === 'signin' ? 'signup' : 'signin')} onMode={setMode} onDone={done} />}
      </div>
      <ToastStack>{toast && <Toast tone="success" title={toast.title} description={toast.description} onClose={() => setToast(null)} />}</ToastStack>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
