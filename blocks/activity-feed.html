<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<style>@media(max-width:600px){.bk-sec{padding:22px 12px!important}}</style>
</head><body style="background:var(--surface-page)">
<div id="root"></div>
<script type="text/babel">

const { Card, Avatar, Badge, Icon } = window.EfolusiDesignSystem_4ffc3d;
const EVENTS = [
  ['Femi Alade', 'rotated the production API key', '2m ago', 'lock', null],
  ['June Park', 'invited sam@acme.co as Admin', '18m ago', 'mail', null],
  ['Ledger', 'invoice #10422 was paid', '1h ago', 'circle-check', ['success', '$1,240']],
  ['Agent', 'completed “Summarize churn drivers”', '3h ago', 'sparkles', ['accent', '14 steps']],
  ['Infra', 'worker-04 latency back to baseline', '5h ago', 'refresh-cw', null],
];
function Block() {
  return (
    <section className="bk-sec" style={{ padding: '40px 48px', maxWidth: 640, margin: '0 auto' }}>
      <Card padding={8} title="Activity">
        {EVENTS.map(([who, what, when, icon, badge], i) => (
          <div key={i} style={{ display: 'flex', gap: 12, alignItems: 'flex-start', padding: '10px 12px', borderTop: i ? '1px solid var(--border-default)' : 'none' }}>
            <span style={{ display: 'inline-flex', width: 28, height: 28, alignItems: 'center', justifyContent: 'center', flex: 'none', borderRadius: 'var(--radius-full)', background: 'var(--surface-sunken)', color: 'var(--text-secondary)' }}><Icon name={icon} size={14} /></span>
            <div style={{ fontSize: 13.5, lineHeight: 1.45, flex: 1 }}>
              <span style={{ fontWeight: 600 }}>{who}</span> <span style={{ color: 'var(--text-secondary)' }}>{what}</span>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 1 }}>{when}</div>
            </div>
            {badge && <Badge tone={badge[0]}>{badge[1]}</Badge>}
          </div>
        ))}
      </Card>
    </section>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Block />);
</script></body></html>
