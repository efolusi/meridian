<!-- @dsCard group="Blocks" viewport="1024x780" name="Settings" subtitle="Sectioned form page with danger zone" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<style>@media(max-width:700px){.bk-row{grid-template-columns:1fr!important;gap:10px!important}.bk-main{padding:20px 16px 36px!important}}</style>
</head><body style="background:var(--surface-page)">
<div id="root"></div>
<script type="text/babel">
const { Button, Input, InputGroup, Select, Switch, Divider, Card, Tabs } = window.EfolusiDesignSystem_4ffc3d;
function Row({ title, desc, children }) {
  return (
    <div className="bk-row" style={{ display: 'grid', gridTemplateColumns: '260px 1fr', gap: 28, padding: '22px 0', borderBottom: '1px solid var(--border-default)', alignItems: 'start' }}>
      <div>
        <div style={{ fontSize: 14.5, fontWeight: 600 }}>{title}</div>
        <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 4, lineHeight: 1.55 }}>{desc}</div>
      </div>
      <div style={{ maxWidth: 420 }}>{children}</div>
    </div>
  );
}
function Block() {
  const [tab, setTab] = React.useState('general');
  return (
    <main className="bk-main" style={{ padding: '28px 32px 48px', maxWidth: 880, margin: '0 auto' }}>
      <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 24, fontWeight: 650, letterSpacing: '-0.01em', margin: 0 }}>Workspace settings</h1>
      <div style={{ marginTop: 14 }}>
        <Tabs value={tab} onChange={setTab} items={[
          { id: 'general', label: 'General' }, { id: 'members', label: 'Members', count: 38 },
          { id: 'billing', label: 'Billing' }, { id: 'api', label: 'API' },
        ]} />
      </div>
      <Row title="Workspace name" desc="Shown in the sidebar and on invoices.">
        <Input defaultValue="Acme Ops" />
      </Row>
      <Row title="Workspace URL" desc="Changing this breaks existing links.">
        <InputGroup prefix="https://" suffix=".efolusi.com" defaultValue="acme" />
      </Row>
      <Row title="Default region" desc="Where new agents run and data lives.">
        <Select options={['us-east-1', 'eu-west-1', 'ap-southeast-1']} defaultValue="eu-west-1" />
      </Row>
      <Row title="Notifications" desc="Digest and failure alerts for every member.">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          <Switch defaultChecked label="Email on failed runs" />
          <Switch label="Weekly usage digest" />
        </div>
      </Row>
      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, padding: '18px 0' }}>
        <Button variant="ghost">Cancel</Button>
        <Button>Save changes</Button>
      </div>
      <Card tone="danger" title="Danger zone" subtitle="These actions are permanent." padding={18} style={{ marginTop: 10 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 18 }}>
          <span style={{ fontSize: 13.5, color: 'var(--text-secondary)' }}>Delete this workspace and every agent, run, and artifact in it.</span>
          <Button variant="danger">Delete workspace</Button>
        </div>
      </Card>
    </main>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Block />);
</script></body></html>
