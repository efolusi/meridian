name: checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Contrast (WCAG AA token pairs)
        run: python3 scripts/check_contrast.py

      - name: Runtime copies (support.js / ds-base.js drift)
        run: python3 scripts/check_runtime_copies.py

      - name: Relative paths resolve
        run: python3 scripts/check_paths.py

      - name: Registry is in sync with its generator
        run: |
          python3 scripts/build_registry.py
          git diff --exit-code -- site/registry.json site/registry

      - name: Generated tokens and interfaces are in sync
        run: |
          python3 scripts/build_tokens.py
          python3 scripts/build_interfaces.py
          git diff --exit-code -- tokens.json tailwind.preset.js site/interfaces.json

      - name: Manifest inventories match the bundle and tokens
        run: python3 scripts/sync_manifest.py --check

      - name: No dead interactive controls
        run: python3 scripts/check_dead_controls.py

      - name: No new raw colour literals
        run: python3 scripts/check_token_adherence.py

      # Fast pre-check: the header's recorded hashes vs the sources on disk.
      - name: Bundle source hashes match source files
        run: python3 scripts/check_bundle_hashes.py

      # The real gate: recompile from source and require the committed artifact to
      # match byte for byte. This is reproduction, not self-attestation — the same
      # standard the registry and token generators are already held to.
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install build dependency
        run: npm ci --no-audit --no-fund
      - name: _ds_bundle.js is reproducible from source
        run: node scripts/build_bundle.mjs --check

      # Keyboard and wiring contracts, run against the component sources rather
      # than the bundle. This is the one gate an outside contributor can turn
      # green without understanding the compiler.
      - name: Unit tests
        run: npm test

      # The ESM package must build and import for real, not just compile.
      - name: npm package builds and imports
        run: |
          node scripts/build_npm.mjs
          node scripts/check_npm_package.mjs

      # The .d.ts layer is hand-maintained, so nothing else forces it to stay
      # valid. Runs after the npm build so the dist/ barrel pass has something
      # to check.
      - name: Types compile (components and the package barrel)
        run: node scripts/check_types.mjs

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      # smoke_headless.mjs does `import { chromium } from 'playwright'`, so the
      # package has to be resolvable from the repo. `npx --package=X node script`
      # does not put X on the module search path, which is why this job failed
      # silently for weeks while the gates job stayed green. Install it for real.
      - name: Install Playwright chromium
        run: |
          npm install --no-save --no-audit --no-fund playwright@1.48.0
          npx playwright install --with-deps chromium
      - name: Serve repo and run headless smoke
        run: |
          python3 -m http.server 8000 --bind 127.0.0.1 &
          SERVER=$!
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:8000/site/_smoke.html >/dev/null && break || sleep 0.5; done
          set +e
          BASE=http://127.0.0.1:8000 SHOTS="$RUNNER_TEMP/shots" node scripts/smoke_headless.mjs
          CODE=$?
          set -e
          kill $SERVER 2>/dev/null || true
          exit $CODE

      # Compares against tests/__shots__ baselines; skips loudly while none
      # exist. Baselines are made by the update-visual-baselines workflow so
      # they always come from this same runner platform.
      - name: Visual regression (group screenshots vs baselines)
        run: SHOTS="$RUNNER_TEMP/shots" node scripts/check_visual.mjs

      - name: Upload shots and diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-shots
          path: ${{ runner.temp }}/shots
          if-no-files-found: ignore
