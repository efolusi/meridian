<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><script src="./ds-base.js"></script><style>@view-transition{navigation:auto}::view-transition-group(*){animation-duration:160ms}@media (prefers-reduced-motion:reduce){::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important}}html{background:#FAF9F6}</style></helmet>
<div data-theme="{{ theme }}" style="display:flex;height:100vh;overflow:hidden;font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-page)">
<aside style="view-transition-name:shell-side;width:240px;flex:none;display:flex;flex-direction:column;border-right:1px solid var(--border-default);background:var(--surface-subtle)">
<a href="./AppPage.dc.html" style="display:flex;align-items:center;gap:10px;padding:16px 16px 14px;color:inherit;text-decoration:none">
<img src="../../assets/logo.png" alt="Efolusi" style="width:30px;height:30px">
<span style="font-family:var(--font-display);font-weight:680;letter-spacing:-0.02em;font-size:19px">Efolusi</span>
</a>
<nav style="display:flex;flex-direction:column;gap:2px;padding:4px 12px">
<a href="./AppPage.dc.html" style="display:flex;align-items:center;gap:10px;height:34px;padding:0 10px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:14px;font-weight:500;text-decoration:none" style-hover="background:var(--surface-sunken);color:var(--text-primary)">Overview</a>
<a href="./Projects.dc.html" style="display:flex;align-items:center;gap:10px;height:34px;padding:0 10px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:14px;font-weight:500;text-decoration:none" style-hover="background:var(--surface-sunken);color:var(--text-primary)">Projects</a>
<a href="./AppSettings.dc.html" style="display:flex;align-items:center;gap:10px;height:34px;padding:0 10px;border-radius:var(--radius-sm);background:var(--accent-subtle);color:var(--brand-700);font-size:14px;font-weight:600;text-decoration:none">Settings</a>
</nav>
<div style="margin-top:auto;display:flex;align-items:center;gap:10px;padding:14px 16px;border-top:1px solid var(--border-default)">
<span style="width:28px;height:28px;border-radius:999px;background:var(--brand-950);color:var(--brand-50);display:grid;place-items:center;font-size:11px;font-weight:600">AO</span>
<span><span style="display:block;font-size:13px;font-weight:600">Ada Obi</span><span style="display:block;font-size:11.5px;color:var(--text-muted)">ada@efolusi.com</span></span>
</div>
</aside>
<main style="flex:1;overflow-y:auto">
<header style="view-transition-name:shell-top;display:flex;align-items:center;gap:12px;height:60px;padding:0 24px;border-bottom:1px solid var(--border-default);position:sticky;top:0;background:var(--surface-page);z-index:20">
<h1 style="font-family:var(--font-display);font-size:18px;font-weight:680;letter-spacing:-0.02em;margin:0">Settings</h1>
</header>
<div style="padding:24px;display:flex;flex-direction:column;gap:20px;max-width:680px">
<div style="background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-md)">
<div style="padding:16px 20px;border-bottom:1px solid var(--border-default);font-size:16px;font-weight:600">Profile</div>
<div style="padding:20px;display:flex;flex-direction:column;gap:16px">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Input" label="Full name" placeholder="Ada Obi" hint-size="100%,64px"></x-import>
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Input" label="Work email" placeholder="ada@efolusi.com" icon-left="mail" hint-size="100%,64px"></x-import>
</div>
<div><x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Button" variant="secondary" size="sm" hint-size="110px,32px">Save changes</x-import></div>
</div>
</div>
<div style="background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-md)">
<div style="padding:16px 20px;border-bottom:1px solid var(--border-default);font-size:16px;font-weight:600">Notifications</div>
<div style="padding:20px;display:flex;flex-direction:column;gap:16px">
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Switch" label="Agent run failures" default-checked="{{ true }}" hint-size="100%,24px"></x-import>
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Switch" label="Weekly usage digest" default-checked="{{ true }}" hint-size="100%,24px"></x-import>
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Switch" label="Product announcements" hint-size="100%,24px"></x-import>
</div>
</div>
<div style="background:var(--surface-card);border:1px solid var(--danger-300);border-radius:var(--radius-md);padding:20px;display:flex;align-items:center;gap:16px;margin-bottom:24px">
<div style="flex:1"><div style="font-size:15px;font-weight:600">Delete account</div><p style="margin:3px 0 0;font-size:13.5px;color:var(--text-secondary)">Removes your profile and transfers owned projects to the workspace owner.</p></div>
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Button" variant="danger" size="sm" hint-size="130px,32px">Delete account</x-import>
</div>
</div>
</main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light'|'dark'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { theme: this.props.theme ?? 'light' };
  }
}
</script>
</body>
</html>
