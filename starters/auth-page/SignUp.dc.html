<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><script src="./ds-base.js"></script><style>@view-transition{navigation:auto}::view-transition-group(*){animation-duration:160ms}@media (prefers-reduced-motion:reduce){::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important}}html{background:#FAF9F6}</style></helmet>
<div data-theme="{{ theme }}" style="display:flex;min-height:100vh;font-family:var(--font-sans)">
<div style="view-transition-name:shell-side;flex:1;background:var(--brand-950);color:var(--brand-50);display:flex;flex-direction:column;padding:48px">
<a href="../marketing-page/MarketingPage.dc.html" style="display:flex;align-items:center;gap:12px;color:inherit;text-decoration:none">
<img src="../../assets/logo.png" alt="" style="width:36px;height:36px">
<span style="font-family:var(--font-display);font-weight:680;letter-spacing:-0.02em;font-size:24px">Efolusi</span>
</a>
<div style="margin-top:auto;max-width:420px">
<div style="font-family:var(--font-display);font-weight:680;letter-spacing:-0.02em;font-size:34px;line-height:1.15">One account. Every Efolusi product.</div>
<p style="margin:14px 0 0;font-size:15px;line-height:1.6;color:var(--text-on-brand-muted)">Agent, Infra, Content, Tools, Trader, and Social share one workspace, one bill, and one login — this one.</p>
</div>
</div>
<div style="flex:1.2;display:flex;align-items:center;justify-content:center;background:var(--surface-page);color:var(--text-primary)">
<div style="width:360px">
<h1 style="font-size:26px;font-weight:680;font-family:var(--font-display);letter-spacing:-0.02em;margin:0">Create your account</h1>
<p style="margin:6px 0 0;font-size:14px;color:var(--text-secondary)">Free for 14 days. No card needed.</p>
<div style="display:flex;flex-direction:column;gap:14px;margin-top:24px">
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Input" size="lg" label="Full name" placeholder="Ada Obi" hint-size="100%,70px"></x-import>
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Input" size="lg" label="Work email" placeholder="you@company.com" icon-left="mail" hint-size="100%,70px"></x-import>
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Input" size="lg" label="Password" type="password" placeholder="12+ characters" icon-left="lock" hint="At least 12 characters — passphrases welcome." hint-size="100%,90px"></x-import>
<a href="./Onboarding.dc.html" style="display:contents"><x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Button" size="lg" full-width="{{ true }}" icon-right="arrow-right" hint-size="100%,44px">Continue</x-import></a>
<div style="display:flex;align-items:center;gap:12px;color:var(--text-muted);font-size:12px"><span style="flex:1;height:1px;background:var(--border-default)"></span>or<span style="flex:1;height:1px;background:var(--border-default)"></span></div>
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Button" size="lg" variant="secondary" full-width="{{ true }}" icon-left="shield-check" hint-size="100%,44px">Continue with SSO</x-import>
</div>
<p style="margin:22px 0 0;font-size:13px;color:var(--text-secondary);text-align:center">Already have an account? <a href="./AuthPage.dc.html" style="font-weight:600;color:var(--text-link);text-decoration:none">Sign in</a></p>
</div>
</div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light'|'dark'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    return { theme: this.props.theme ?? 'light' };
  }
}
</script>
</body>
</html>
