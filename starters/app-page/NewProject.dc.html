<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet><script src="./ds-base.js"></script><style>@view-transition{navigation:auto}::view-transition-group(*){animation-duration:160ms}@media (prefers-reduced-motion:reduce){::view-transition-group(*),::view-transition-old(*),::view-transition-new(*){animation:none!important}}html{background:#FAF9F6}</style></helmet>
<div data-theme="{{ theme }}" style="display:flex;height:100vh;overflow:hidden;font-family:var(--font-sans);color:var(--text-primary);background:var(--surface-page)">
<aside style="view-transition-name:shell-side;width:240px;flex:none;display:flex;flex-direction:column;border-right:1px solid var(--border-default);background:var(--surface-subtle)">
<a href="./AppPage.dc.html" style="display:flex;align-items:center;gap:10px;padding:16px 16px 14px;color:inherit;text-decoration:none">
<img src="../../assets/logo.png" alt="Efolusi" style="width:30px;height:30px">
<span style="font-family:var(--font-display);font-weight:680;letter-spacing:-0.02em;font-size:19px">Efolusi</span>
</a>
<nav style="display:flex;flex-direction:column;gap:2px;padding:4px 12px">
<a href="./AppPage.dc.html" style="display:flex;align-items:center;gap:10px;height:34px;padding:0 10px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:14px;font-weight:500;text-decoration:none" style-hover="background:var(--surface-sunken);color:var(--text-primary)">Overview</a>
<a href="./Projects.dc.html" style="display:flex;align-items:center;gap:10px;height:34px;padding:0 10px;border-radius:var(--radius-sm);background:var(--accent-subtle);color:var(--brand-700);font-size:14px;font-weight:600;text-decoration:none">Projects</a>
<a href="./AppSettings.dc.html" style="display:flex;align-items:center;gap:10px;height:34px;padding:0 10px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:14px;font-weight:500;text-decoration:none" style-hover="background:var(--surface-sunken);color:var(--text-primary)">Settings</a>
</nav>
<div style="margin-top:auto;display:flex;align-items:center;gap:10px;padding:14px 16px;border-top:1px solid var(--border-default)">
<span style="width:28px;height:28px;border-radius:999px;background:var(--brand-950);color:var(--brand-50);display:grid;place-items:center;font-size:11px;font-weight:600">AO</span>
<span><span style="display:block;font-size:13px;font-weight:600">Ada Obi</span><span style="display:block;font-size:11.5px;color:var(--text-muted)">ada@efolusi.com</span></span>
</div>
</aside>
<main style="flex:1;overflow-y:auto">
<header style="view-transition-name:shell-top;display:flex;align-items:center;gap:12px;height:60px;padding:0 24px;border-bottom:1px solid var(--border-default);position:sticky;top:0;background:var(--surface-page);z-index:20">
<span style="font-size:13px;color:var(--text-muted)"><a href="./Projects.dc.html" style="color:var(--text-link);font-weight:600;text-decoration:none">Projects</a> / New</span>
</header>
<div style="padding:32px 24px;display:flex;justify-content:center">
<div style="width:560px;max-width:100%">
<h1 style="font-family:var(--font-display);font-size:24px;font-weight:680;letter-spacing:-0.02em;margin:0">New project</h1>
<p style="margin:6px 0 0;font-size:14px;color:var(--text-secondary)">Projects group runs, keys, and spend under one line item.</p>
<div style="background:var(--surface-card);border:1px solid var(--border-default);border-radius:var(--radius-md);padding:24px;margin-top:20px;display:flex;flex-direction:column;gap:22px">
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Input" size="lg" label="Project name" placeholder="e.g. Churn digest agent" hint-size="100%,70px"></x-import>
<div>
<div style="font-size:13.5px;font-weight:600">Product</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px">
<sc-for list="{{ products }}" as="p" hint-placeholder-count="6">
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.ButtonTile" title="{{ p.name }}" selected="{{ p.on }}" onClick="{{ p.pick }}" hint-size="100%,44px"></x-import>
</sc-for>
</div>
</div>
<div>
<div style="font-size:13.5px;font-weight:600">Region</div>
<div style="display:inline-block;margin-top:10px">
<x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.SegmentedControl" options="{{ regionOptions }}" value="{{ region }}" onChange="{{ setRegion }}" hint-size="320px,36px"></x-import>
</div>
</div>
<div style="display:flex;gap:10px;padding-top:2px">
<a href="./ProjectDetail.dc.html" style="display:contents"><x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Button" icon-right="arrow-right" hint-size="150px,40px">Create project</x-import></a>
<a href="./Projects.dc.html" style="display:contents"><x-import component-from-global-scope="EfolusiDesignSystem_4ffc3d.Button" variant="ghost" hint-size="80px,40px">Cancel</x-import></a>
</div>
</div>
</div>
</div>
</main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;'light'|'dark'&quot;}}">
class Component extends DCLogic {
  state = { product: 'Agent', region: 'eu-west-1' };
  renderVals() {
    return {
      theme: this.props.theme ?? 'light',
      products: ['Agent', 'Infra', 'Node', 'Toolbox', 'Trader', 'Social'].map(name => ({
        name, on: this.state.product === name, pick: () => this.setState({ product: name }),
      })),
      region: this.state.region,
      regionOptions: [{ id: 'us-east-1', label: 'us-east-1' }, { id: 'eu-west-1', label: 'eu-west-1' }, { id: 'ap-south-1', label: 'ap-south-1' }],
      setRegion: (id) => this.setState({ region: id }),
    };
  }
}
</script>
</body>
</html>
