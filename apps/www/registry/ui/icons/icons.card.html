<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../../../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</head><body style="background:var(--surface-page)">
<div id="root"></div>
<script type="text/babel">
const { Icon, Tooltip } = window.EfolusiDesignSystem_4ffc3d;
const names = ['house','search','settings','user','users','bell','mail','lock','calendar','clock','inbox','folder','file-text','credit-card','wallet','database','globe','link','send','message-square','plus','check','x','pencil','copy','trash-2','upload','download','refresh-cw','external-link','arrow-right','arrow-up-right','chevron-down','chevron-right','ellipsis','funnel','sliders-horizontal','panel-left','layout-dashboard','chart-column','chart-line','trending-up','activity','zap','sparkles','star','rocket','shield-check','badge-check','terminal','code','book-open','life-buoy','log-out','circle-check','circle-alert','triangle-alert','info','eye','eye-off','menu','chevron-left','chevron-up','loader-circle'];
function Demo() {
  return (
    <div style={{ padding: '18px 20px', display: 'grid', gridTemplateColumns: 'repeat(16, 1fr)', gap: 6 }}>
      {names.map(n => (
        <Tooltip key={n} label={n}>
          <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 36, height: 36, borderRadius: 'var(--radius-sm)', color: 'var(--sand-700)', cursor: 'default' }}
            onMouseEnter={e => { e.currentTarget.style.background = 'var(--sand-100)'; e.currentTarget.style.color = 'var(--text-primary)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = ''; e.currentTarget.style.color = 'var(--sand-700)'; }}>
            <Icon name={n} size={18} />
          </span>
        </Tooltip>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script></body></html>
