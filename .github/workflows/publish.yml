name: publish

# Publishes @efolusi/meridian to npm using Trusted Publishing (OIDC), so no npm
# token is ever stored in this repository or in GitHub secrets. GitHub mints a
# short-lived identity token for this exact workflow, and npm verifies it against
# the trusted publisher configured on the package.
#
# One-time setup on npmjs.com under the package's Settings -> Trusted Publisher:
#   Provider    GitHub Actions
#   Repository  efolusi/meridian     (case sensitive)
#   Workflow    publish.yml
#   Environment npm-publish
# A misconfigured trusted publisher surfaces as a bare 404 on publish, which
# means "npm rejected the OIDC identity", not "package missing" — check the
# repository spelling, the workflow filename, and the environment name.
#
# Three ways in:
#   push to main   — THE NORMAL PATH. When _ds_manifest.json carries a version
#                    that is not on the registry yet, this run re-checks every
#                    gate, publishes, then creates the vX.Y.Z tag and GitHub
#                    Release itself. A push whose version is already published
#                    is a no-op. Releasing is therefore just: bump the version,
#                    update the changelog, push (see RELEASING.md).
#   release        — cutting a GitHub Release by hand still publishes, with the
#                    extra guard that the tag must match the built version.
#   dispatch       — manual rehearsal; defaults to dry run. Non-dry requires
#                    the matching tag at HEAD.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build and validate, but do not publish'
        type: boolean
        default: true

# Two version-bump pushes racing would both pass the registry check and publish
# out of order. Serialize; never cancel a publish mid-flight.
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Fast gate so routine pushes don't spin up the whole publish machinery.
  decide:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.d.outputs.go }}
      version: ${{ steps.d.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: d
        run: |
          VERSION="$(node -p "require('./_ds_manifest.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if npm view "@efolusi/meridian@$VERSION" version >/dev/null 2>&1; then
            echo "@efolusi/meridian@$VERSION is already on the registry — nothing to release."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "version $VERSION is not on the registry — this push releases it."
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: decide
    if: needs.decide.outputs.go == 'true'
    runs-on: ubuntu-latest
    # Gives the publish a reviewable gate in repo settings, and scopes the OIDC
    # claim. Must match the Environment named in the trusted publisher config.
    environment: npm-publish
    permissions:
      contents: write # the auto path pushes the tag and creates the Release
      id-token: write # required for OIDC; without it npm cannot verify the workflow

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing needs npm 11.5.1 or newer; node 22 still bundles 10.x.
      - name: Use an npm that understands trusted publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install
        run: npm ci --no-audit --no-fund

      # A package that cannot pass its own checks has no business on a registry,
      # and a bad version cannot be unpublished after 72 hours.
      - name: Gates
        run: |
          python3 scripts/check_contrast.py
          python3 scripts/check_runtime_copies.py
          python3 scripts/check_paths.py
          python3 scripts/check_dead_controls.py
          python3 scripts/check_token_adherence.py
          python3 scripts/check_bundle_hashes.py
          python3 scripts/sync_manifest.py --check
          node scripts/build_bundle.mjs --check

      - name: Tests
        run: npm test

      - name: Build the package
        run: node scripts/build_npm.mjs

      - name: Validate the package
        run: |
          node scripts/check_npm_package.mjs
          node scripts/check_types.mjs

      # The tag is the release's claim about what this is; the manifest is what
      # actually got built. If they disagree, the wrong thing is about to ship
      # under a name people will pin.
      - name: Tag and package version must agree
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          PKG="$(node -p "require('./dist/package.json').version")"
          echo "release tag: $TAG"
          echo "package    : $PKG"
          if [ "$TAG" != "v$PKG" ]; then
            echo "::error::tag $TAG does not match package version $PKG."
            echo "Bump version in _ds_manifest.json (the npm build reads it from there), or retag."
            exit 1
          fi

      # A manual non-dry publish must still be anchored to a tag: an untagged
      # tree reaching the registry means a version nobody can check out later.
      # (The push path creates its tag itself, after the publish succeeds.)
      - name: Non-dry dispatch requires the matching tag at HEAD
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == false
        run: |
          PKG="$(node -p "require('./dist/package.json').version")"
          git fetch --tags --quiet
          TAG_SHA="$(git rev-list -n1 "v$PKG" 2>/dev/null || true)"
          HEAD_SHA="$(git rev-parse HEAD)"
          if [ -z "$TAG_SHA" ]; then
            echo "::error::tag v$PKG does not exist. Tag the release commit first (see RELEASING.md)."
            exit 1
          fi
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "::error::tag v$PKG points at $TAG_SHA but this run builds $HEAD_SHA."
            exit 1
          fi
          echo "tag v$PKG is at HEAD"

      # Republishing an existing version fails at the registry anyway; failing
      # here says why, instead of surfacing a bare 403. On the push path this
      # re-checks what `decide` saw, after the slow steps — closing the race.
      - name: Version must not already be published
        run: |
          PKG="$(node -p "require('./dist/package.json').version")"
          NAME="$(node -p "require('./dist/package.json').name")"
          if npm view "$NAME@$PKG" version >/dev/null 2>&1; then
            echo "::error::$NAME@$PKG is already on the registry. npm versions are immutable; bump it."
            exit 1
          fi
          echo "$NAME@$PKG is not on the registry yet"

      - name: Pack (what would ship)
        run: npm pack ./dist --dry-run

      - name: Publish
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run == false
        # No NODE_AUTH_TOKEN: the OIDC identity above is the credential.
        # Provenance is attached automatically when publishing this way.
        run: npm publish ./dist --access public

      # The auto path finishes the paperwork the human used to do. Releases
      # created with GITHUB_TOKEN do not trigger other workflows, so this cannot
      # re-enter the `release` path and double-publish.
      - name: Tag and cut the GitHub Release (auto path)
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG="$(node -p "require('./dist/package.json').version")"
          python3 - "$PKG" > /tmp/notes.md <<'EOF'
          import re, sys
          ver = sys.argv[1]
          t = open('CHANGELOG.md', encoding='utf-8').read()
          m = re.search(rf'^## {re.escape(ver)}[^\n]*\n(.*?)(?=^## |\Z)', t, re.S | re.M)
          print(m.group(1).strip() if m else f'Meridian {ver}. Details in CHANGELOG.md.')
          EOF
          git tag "v$PKG"
          git push origin "v$PKG"
          gh release create "v$PKG" --title "Meridian $PKG" --notes-file /tmp/notes.md
          echo "released v$PKG"

      - name: Dry run finished
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: echo "Dry run only. Nothing was published."
