<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary)}</style></head><body style="padding:14px 16px"><div style="display:flex;gap:12px;align-items:center"><div style="text-align:center"><div style="display:inline-flex;height:36px;align-items:center;padding:0 14px;background:var(--accent);color:#fff;border-radius:4px;font-size:14px;font-weight:600">Rest</div></div><div style="text-align:center"><div style="display:inline-flex;height:36px;align-items:center;padding:0 14px;background:var(--accent-hover);color:#fff;border-radius:4px;font-size:14px;font-weight:600">Hover</div></div><div style="text-align:center"><div style="display:inline-flex;height:36px;align-items:center;padding:0 14px;background:var(--accent-active);color:#fff;border-radius:4px;font-size:14px;font-weight:600;transform:scale(.985)">Press</div></div><div style="text-align:center"><div style="display:inline-flex;height:36px;align-items:center;padding:0 14px;background:var(--accent);color:#fff;border-radius:4px;font-size:14px;font-weight:600;box-shadow:var(--focus-ring)">Focus</div></div><div style="text-align:center"><div style="display:inline-flex;height:36px;align-items:center;padding:0 14px;background:var(--accent);color:#fff;border-radius:4px;font-size:14px;font-weight:600;opacity:.45">Disabled</div></div><div style="font-size:11px;color:var(--text-muted);line-height:1.6;flex:1">Darker on hover, darker + scale(.985) on press, 2px caramel ring on focus — always.</div></div></body></html>
