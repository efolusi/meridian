<!-- @dsCard group="Effects" viewport="700x150" name="Motion" subtitle="Fast settles, quick exits" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary)}@keyframes pop{0%,20%{transform:scale(.6);opacity:0}55%{transform:scale(1.02);opacity:1}70%,100%{transform:scale(1)}}@keyframes slide{0%,20%{transform:translateX(-14px);opacity:0}60%,100%{transform:translateX(0);opacity:1}}</style></head><body style="padding:14px 16px"><div style="display:flex;gap:20px;align-items:center"><div style="flex:1"><div style="height:56px;display:flex;align-items:center;justify-content:center"><div style="width:40px;height:40px;border-radius:10px;background:var(--accent);animation:pop 2.2s var(--ease-spring) infinite"></div></div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-secondary);text-align:center">--ease-spring · entrances, pops</div></div><div style="flex:1"><div style="height:56px;display:flex;align-items:center;justify-content:center"><div style="width:40px;height:40px;border-radius:10px;background:var(--cocoa-700);animation:slide 2.2s var(--ease-out) infinite"></div></div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-secondary);text-align:center">--ease-out · exits, color</div></div><div style="flex:1.2;font-size:11px;color:var(--text-muted);line-height:1.6">100 / 160 / 240ms.<br>Fast settles, no bounce — motion confirms, it never performs. Nothing longer than 240ms.</div></div></body></html>
