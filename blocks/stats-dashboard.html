<!-- @dsCard group="Blocks" viewport="1280x660" name="Stats dashboard" subtitle="KPI row, trend chart, top-agents table" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<style>@media(max-width:900px){.bk-kpis{grid-template-columns:1fr 1fr!important}.bk-panels{grid-template-columns:1fr!important}}@media(max-width:560px){.bk-kpis{grid-template-columns:1fr!important}.bk-main{padding:16px!important}}</style>
</head><body style="background:var(--surface-page)">
<div id="root"></div>
<script type="text/babel">
const { Card, Stat, BarChart, Table, Badge, Button, SegmentedControl } = window.EfolusiDesignSystem_4ffc3d;
function Block() {
  const [range, setRange] = React.useState('30d');
  return (
    <main className="bk-main" style={{ padding: 28, maxWidth: 1160, margin: '0 auto' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap', rowGap: 10 }}>
        <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 24, fontWeight: 650, letterSpacing: '-0.01em', margin: 0 }}>Overview</h1>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 10 }}>
          <SegmentedControl value={range} onChange={setRange} options={[{ id: '7d', label: '7d' }, { id: '30d', label: '30d' }, { id: '90d', label: '90d' }]} />
          <Button variant="secondary" size="sm" iconLeft="arrow-down-right">Export</Button>
        </div>
      </div>
      <div className="bk-kpis" style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 14, marginTop: 18 }}>
        <Card padding={16}><Stat label="Total runs" value="12,480" delta="+12.4%" direction="up" hint="vs previous period" /></Card>
        <Card padding={16}><Stat label="Success rate" value="98.2%" delta="+0.4pt" direction="up" /></Card>
        <Card padding={16}><Stat label="P95 latency" value="212 ms" delta="−8 ms" direction="down" /></Card>
        <Card padding={16}><Stat label="Spend" value="$4,820" delta="+6.1%" direction="up" hint="of $6,000 budget" /></Card>
      </div>
      <div className="bk-panels" style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 14, marginTop: 14 }}>
        <Card title="Runs per week" padding={18}>
          <BarChart height={170} highlightLast={1} labels={['W1','W2','W3','W4','W5','W6','W7','W8']} data={[820, 940, 1010, 890, 1180, 1260, 1340, 1520]} />
        </Card>
        <Card title="Top agents" padding={0}>
          <Table rowKey="id" columns={[
            { key: 'name', label: 'Agent' },
            { key: 'runs', label: 'Runs', numeric: true, align: 'right' },
            { key: 'status', label: 'Status', render: (v) => <Badge tone={v === 'Live' ? 'success' : 'neutral'} dot={v === 'Live'}>{v}</Badge> },
          ]} rows={[
            { id: 'a', name: 'Inbox triager', runs: 4120, status: 'Live' },
            { id: 'b', name: 'Flight rebooking', runs: 1280, status: 'Live' },
            { id: 'c', name: 'Refund handler', runs: 960, status: 'Live' },
            { id: 'd', name: 'Weekly digest', runs: 340, status: 'Paused' },
          ]} />
        </Card>
      </div>
    </main>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Block />);
</script></body></html>
