name: checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Contrast (WCAG AA token pairs)
        run: python3 scripts/check_contrast.py

      - name: Runtime copies (support.js / ds-base.js drift)
        run: python3 scripts/check_runtime_copies.py

      - name: Relative paths resolve
        run: python3 scripts/check_paths.py

      - name: Registry is in sync with its generator
        run: |
          python3 scripts/build_registry.py
          git diff --exit-code -- site/registry.json site/registry

      - name: Generated tokens and interfaces are in sync
        run: |
          python3 scripts/build_tokens.py
          python3 scripts/build_interfaces.py
          git diff --exit-code -- tokens.json tailwind.preset.js site/interfaces.json

      - name: Manifest token inventory matches tokens/*.css
        run: python3 scripts/sync_manifest_tokens.py --check

      - name: Bundle source hashes match source files
        run: |
          python3 - <<'EOF'
          import pathlib, json, hashlib, sys
          t = pathlib.Path("_ds_bundle.js").read_text()
          header = t[:t.index("\n")]
          hj = json.loads(header[header.index("{"):header.rindex("}")+1])
          bad = []
          for p, h in hj["sourceHashes"].items():
              f = pathlib.Path(p)
              if not f.exists():
                  bad.append(p + ": missing"); continue
              if hashlib.sha256(f.read_bytes()).hexdigest()[:len(h)] != h:
                  bad.append(p + ": hash mismatch (bundle stale)")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print(f"{len(hj['sourceHashes'])} source hashes verified")
          EOF

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright chromium
        run: npx --yes playwright@1.48.0 install --with-deps chromium
      - name: Serve repo and run headless smoke
        run: |
          python3 -m http.server 8000 --bind 127.0.0.1 &
          SERVER=$!
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:8000/site/_smoke.html >/dev/null && break || sleep 0.5; done
          BASE=http://127.0.0.1:8000 npx --yes --package=playwright@1.48.0 node scripts/smoke_headless.mjs
          CODE=$?
          kill $SERVER 2>/dev/null || true
          exit $CODE
