<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary)}</style></head><body style="padding:14px 16px"><div style="display:flex;gap:12px;align-items:stretch"><div style="flex:1.4;background:var(--surface-page);border:1px dashed var(--sand-300);border-radius:8px;padding:10px"><div style="font-size:9px;font-family:var(--font-mono);color:var(--text-muted)">--surface-page</div><div style="margin-top:6px;background:var(--surface-card);border:1px solid var(--border-default);border-radius:6px;padding:10px;box-shadow:var(--shadow-xs)"><div style="font-size:9px;font-family:var(--font-mono);color:var(--text-muted)">--surface-card + --border-default</div><div style="margin-top:6px;background:var(--surface-sunken);border-radius:4px;padding:8px;font-size:9px;font-family:var(--font-mono);color:var(--text-muted)">--surface-sunken</div></div></div><div style="flex:1;display:flex;flex-direction:column;gap:2px;justify-content:center"><div style="font-size:14px;font-weight:600;color:var(--text-primary)">--text-primary</div><div style="font-size:13px;color:var(--text-secondary)">--text-secondary</div><div style="font-size:13px;color:var(--text-muted)">--text-muted</div><a href="#" style="font-size:13px">--text-link</a></div><div style="flex:1;background:var(--surface-inverse);border-radius:8px;padding:12px;display:flex;flex-direction:column;justify-content:center;gap:4px"><div style="color:var(--text-inverse);font-size:13px;font-weight:600">--surface-inverse</div><div style="color:rgba(250,249,246,.65);font-size:11px">Espresso, not black.</div></div></div></body></html>
