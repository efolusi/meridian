<!DOCTYPE html><html><head><meta charset="utf-8"><title>Meridian smoke test</title>
<link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<style>body{margin:0;font-family:var(--font-sans);background:var(--surface-page);color:var(--text-primary)}#summary{position:sticky;top:0;z-index:9;padding:14px 22px;font:600 15px var(--font-mono);background:var(--surface-card);border-bottom:1px solid var(--border-strong)}.demo{border-bottom:1px solid var(--border-default);padding:18px 22px}.demo h4{margin:0 0 10px;font:600 12px var(--font-mono);color:var(--text-muted)}.fail{color:#B3261E;font:600 13px var(--font-mono);white-space:pre-wrap}</style>
</head><body>
<div id="summary">Loading…</div>
<div id="demos"></div>
<script>
(async () => {
  // Demo files are derived from the registry (group ids) + charts, so a new
  // group is smoke-tested automatically instead of being silently skipped.
  let FILES;
  try {
    const rt = await (await fetch('./registry.js')).text();
    const groups = JSON.parse(rt.slice(rt.indexOf('GROUPS = ') + 9, rt.lastIndexOf(';')));
    FILES = [...new Set(groups.map(g => g.id)), 'charts'];
  } catch (e) {
    FILES = ['forms','display','navigation','feedback','data','overlay','ai','code','files','dates','finance','icons','charts'];
  }
  const fails = [], all = [];
  for (const f of FILES) {
    let src = '';
    try { src = await (await fetch('./examples/' + f + '.jsx')).text(); } catch (e) { fails.push(f + '.jsx: fetch failed'); continue; }
    const chunks = src.split('// @demo ').slice(1);
    for (const c of chunks) {
      const m = c.match(/export function (\w+)/);
      if (!m) { fails.push(f + '.jsx: chunk without export'); continue; }
      all.push({ file: f, exp: m[1], code: c.slice(c.indexOf('\n') + 1).replace('export function', 'function') });
    }
  }
  const R = React, host = document.getElementById('demos');
  class B extends R.Component {
    constructor(p) { super(p); this.state = { err: null }; }
    static getDerivedStateFromError(e) { return { err: e }; }
    componentDidCatch(e) { fails.push(this.props.id + ': ' + (e.message || e)); console.error('SMOKE FAIL', this.props.id, e); signal(); }
    render() { return this.state.err ? R.createElement('div', { className: 'fail' }, String(this.state.err.message || this.state.err)) : this.props.children; }
  }
  // Machine-readable result for headless CI: html[data-smoke], document.title, window.__SMOKE__.
  function signal() {
    const ok = fails.length === 0, passed = all.length - fails.length;
    const line = 'SMOKE: ' + passed + '/' + all.length + ' rendered, ' + fails.length + ' failed' + (fails.length ? ' — ' + fails.join(' | ') : '');
    const s = document.getElementById('summary');
    s.textContent = line; s.style.color = ok ? 'inherit' : '#B3261E';
    document.documentElement.setAttribute('data-smoke', ok ? 'pass' : 'fail');
    document.title = (ok ? 'SMOKE PASS' : 'SMOKE FAIL') + ' — ' + passed + '/' + all.length;
    window.__SMOKE__ = { total: all.length, passed, failed: fails.length, ok, fails: fails.slice() };
  }
  for (const d of all) {
    const id = d.file + '#' + d.exp;
    const wrap = document.createElement('div');
    wrap.className = 'demo';
    wrap.innerHTML = '<h4>' + id + '</h4><div></div>';
    host.appendChild(wrap);
    try {
      const js = Babel.transform(d.code, { presets: ['react'] }).code;
      const Comp = new Function('React', js + '\nreturn ' + d.exp + ';')(R);
      ReactDOM.createRoot(wrap.lastChild).render(R.createElement(B, { id }, R.createElement(Comp)));
    } catch (e) { fails.push(id + ': ' + (e.message || e)); console.error('SMOKE FAIL', id, e); }
  }
  setTimeout(() => { signal(); if (!fails.length) console.log('SMOKE OK — ' + all.length + ' demos rendered clean'); }, 1500);
})();
</script>
</body></html>
