<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"><style>body{margin:0;background:var(--surface-page);font-family:var(--font-sans);color:var(--text-primary)}</style></head><body style="padding:14px 16px"><div style="display:flex;gap:16px"><div style="flex:1;text-align:center"><div style="height:56px;background:var(--surface-card);border-radius:8px;box-shadow:var(--shadow-xs)"></div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-secondary);margin-top:8px">--shadow-xs</div><div style="font-size:10px;color:var(--text-muted)">cards at rest</div></div><div style="flex:1;text-align:center"><div style="height:56px;background:var(--surface-card);border-radius:8px;box-shadow:var(--shadow-sm)"></div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-secondary);margin-top:8px">--shadow-sm</div><div style="font-size:10px;color:var(--text-muted)">raised cards</div></div><div style="flex:1;text-align:center"><div style="height:56px;background:var(--surface-card);border-radius:8px;box-shadow:var(--shadow-md)"></div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-secondary);margin-top:8px">--shadow-md</div><div style="font-size:10px;color:var(--text-muted)">dropdowns</div></div><div style="flex:1;text-align:center"><div style="height:56px;background:var(--surface-card);border-radius:8px;box-shadow:var(--shadow-lg)"></div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-secondary);margin-top:8px">--shadow-lg</div><div style="font-size:10px;color:var(--text-muted)">popovers</div></div><div style="flex:1;text-align:center"><div style="height:56px;background:var(--surface-card);border-radius:8px;box-shadow:var(--shadow-pop)"></div><div style="font-family:var(--font-mono);font-size:9px;color:var(--text-secondary);margin-top:8px">--shadow-pop</div><div style="font-size:10px;color:var(--text-muted)">modals</div></div></div><div style="margin-top:8px;font-
