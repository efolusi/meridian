<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head><body style="background:var(--surface-page)">
<div id="root"></div>
<script type="text/babel">
const { Table, Stat, EmptyState, Skeleton, Card, Badge, Button, Avatar, LineChart, DonutChart, Sparkline, BarChart, KeyValueList, StatusDot } = window.EfolusiDesignSystem_4ffc3d;
const rows = [
  { id: 1, name: 'Acme Robotics', plan: 'Growth', mrr: '$1,240', status: 'Active' },
  { id: 2, name: 'Bloom Health', plan: 'Scale', mrr: '$3,860', status: 'Active' },
  { id: 3, name: 'Everline', plan: 'Scale', mrr: '$2,410', status: 'Past due' },

    <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 18 }}>

        <Card padding={16} style={{ flex: 1 }}><Stat label="Monthly recurring revenue" value="$48.2k" delta="12.4%" direction="up" /></Card>

      <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 16 }}>

        <Card title="Revenue by product" padding={16}>
          <DonutChart size={124} centerValue="$48.2k" centerLabel="MRR" data={[

          ]} />
        </Card>
      </div>
      <Card padding={0}>
        <Table rowKey="id" onRowClick={() => {}} columns={[

          { key: 'status', label: 'Status', render: v => <Badge tone={v === 'Active' ? 'success' : 'warning'} dot>{v}</Badge> },
          { key: 'mrr', label: 'MRR', numeric: true, align: 'right' },

      <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 16 }}>

        <Card padding={16}>
          <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
            <Skeleton variant="circle" width={32} />
            <div style={{ flex: 1 }}><Skeleton lines={2} /></div>
          </div>
          <Skeleton variant="rect" height={56} style={{ marginTop: 14 }} />
        </Card>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
        <Card title="Weekly runs" padding={16}>
          <BarChart height={130} highlightLast={1} labels={['Mon','Tue','Wed','Thu','Fri','Sat','Sun']} data={[42,58,51,74,66,30,89]} formatValue={v => v + ' runs'} />
        </Card>
        <Card title="Resource" padding={16}>
          <KeyValueList labelWidth={120} items={[
            { label: 'Status', value: <Badge tone="success" dot>Healthy</Badge> },
            { label: 'Region', value: 'eu-west-1' },
            { label: 'Endpoint', value: 'api.acme.efolusi.com', mono: true },
          ]} />

      </div>
      <div style={{ display: 'flex', gap: 22, flexWrap: 'wrap' }}>

        <StatusDot state="warn" label="Queue depth" />
        <StatusDot state="err" label="Webhooks" />
        <StatusDot state="off" label="Sandbox" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script></body></html>
